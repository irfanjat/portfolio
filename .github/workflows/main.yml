name: CI-CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: |
          docker build --no-cache -t irfanjat/myportfolio:${{ github.sha }} .
          docker tag irfanjat/myportfolio:${{ github.sha }} irfanjat/myportfolio:latest

      - name: Push Docker Image
        run: |
          docker push irfanjat/myportfolio:${{ github.sha }}
          docker push irfanjat/myportfolio:latest
